version: '3.8'

services:
  # Backend API (development mode with hot reload)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: teenverse-backend-dev
    ports:
      - "5000:5000"
      - "9229:9229"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-teenverse}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-teenverse}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-for-local-dev-only}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-demo}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-demo}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-demo}
      - B2_KEY_ID=${B2_KEY_ID:-}
      - B2_APPLICATION_KEY=${B2_APPLICATION_KEY:-}
      - B2_BUCKET_NAME=${B2_BUCKET_NAME:-teenverse-backups}
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@localhost}
      - LOG_LEVEL=debug
    volumes:
      - .:/app
      - /app/node_modules
      - /app/backend/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: ["npm", "run", "dev:backend"]
    networks:
      - teenverse-dev-network

  # Frontend (Vite dev server)
  frontend:
    image: node:20-alpine
    container_name: teenverse-frontend-dev
    working_dir: /app/frontend
    ports:
      - "3000:3000"
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    command: sh -c "cd /app/frontend && npm install && npm run dev -- --host"
    depends_on:
      - backend
    networks:
      - teenverse-dev-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: teenverse-postgres-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-teenverse}
      POSTGRES_USER: ${POSTGRES_USER:-teenverse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-teenverse} -d ${POSTGRES_DB:-teenverse}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - teenverse-dev-network

  # Redis (optional - for caching in dev)
  redis:
    image: redis:7-alpine
    container_name: teenverse-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - teenverse-dev-network

  # Adminer (Database GUI)
  adminer:
    image: adminer:latest
    container_name: teenverse-adminer-dev
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - teenverse-dev-network

volumes:
  postgres_dev_data:
  redis_dev_data:

networks:
  teenverse-dev-network:
    driver: bridge
