apiVersion: apps/v1
kind: Deployment
metadata:
  name: teenverse-backend
  namespace: teenverse
  labels:
    app: teenverse-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: teenverse-backend
  template:
    metadata:
      labels:
        app: teenverse-backend
    spec:
      containers:
        - name: backend
          image: teenverse/backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5000"
          envFrom:
            - secretRef:
                name: teenverse-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: teenverse-backend-service
  namespace: teenverse
spec:
  selector:
    app: teenverse-backend
  ports:
    - port: 80
      targetPort: 5000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: teenverse-backend-hpa
  namespace: teenverse
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: teenverse-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
