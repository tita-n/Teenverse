apiVersion: v1
kind: Namespace
metadata:
  name: teenverse
---
apiVersion: v1
kind: Secret
metadata:
  name: teenverse-secrets
  namespace: teenverse
type: Opaque
stringData:
  SECRET_KEY: "CHANGE_ME_TO_A_STRONG_SECRET"
  DATABASE_URL: "postgresql://user:password@postgres:5432/teenverse"
  CLOUDINARY_CLOUD_NAME: "your-cloud-name"
  CLOUDINARY_API_KEY: "your-api-key"
  CLOUDINARY_API_SECRET: "your-api-secret"
  B2_KEY_ID: "your-b2-key-id"
  B2_APPLICATION_KEY: "your-b2-application-key"
  ADMIN_EMAIL: "admin@teenverse.com"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: teenverse-config
  namespace: teenverse
data:
  ALLOWED_ORIGINS: "https://teenverse.com,https://www.teenverse.com"
  NODE_ENV: "production"
  LOG_LEVEL: "info"
