version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teenverse-backend-staging
    environment:
      - NODE_ENV=staging
      - PORT=5000
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - SECRET_KEY=${SECRET_KEY}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - B2_KEY_ID=${B2_KEY_ID}
      - B2_APPLICATION_KEY=${B2_APPLICATION_KEY}
      - B2_BUCKET_NAME=${B2_BUCKET_NAME}
      - ALLOWED_ORIGINS=${STAGING_ORIGINS}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - LOG_LEVEL=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - teenverse-staging-network

  postgres:
    image: postgres:15-alpine
    container_name: teenverse-postgres-staging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-teenverse_staging}
      POSTGRES_USER: ${POSTGRES_USER:-teenverse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-teenverse} -d ${POSTGRES_DB:-teenverse_staging}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - teenverse-staging-network

  redis:
    image: redis:7-alpine
    container_name: teenverse-redis-staging
    command: redis-server --appendonly yes
    volumes:
      - redis_staging_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - teenverse-staging-network

  nginx:
    image: nginx:alpine
    container_name: teenverse-nginx-staging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - teenverse-staging-network

volumes:
  postgres_staging_data:
  redis_staging_data:

networks:
  teenverse-staging-network:
    driver: bridge
